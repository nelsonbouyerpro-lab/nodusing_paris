<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — nodusing Paris</title>
  <meta name="description" content="Parlez-nous de votre projet d'application sur mesure. nodusing vous répond sous 24 heures.">
  <meta property="og:title" content="Contact — nodusing Paris">
  <meta property="og:description" content="Démarrons votre projet.">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="fr_FR">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230B1220'/%3E%3Cpath d='M20 47 V17 L44 47 V17' fill='none' stroke='%23F5F7FA' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='20' cy='17' r='4.5' fill='%23F5F7FA'/%3E%3Ccircle cx='20' cy='47' r='4.5' fill='%23F5F7FA'/%3E%3Ccircle cx='44' cy='17' r='4.5' fill='%23F5F7FA'/%3E%3Ccircle cx='44' cy='47' r='6' fill='%235B7CFF'/%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="brand" aria-label="nodusing Paris — retour à l'accueil">
      <svg viewBox="0 0 140 170" width="26" height="32" aria-hidden="true">
        <path d="M26 143 V27 L114 143 V27" fill="none" stroke="#F5F7FA" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="26" cy="27" r="10" fill="#F5F7FA"/>
        <circle cx="26" cy="143" r="10" fill="#F5F7FA"/>
        <circle cx="114" cy="27" r="10" fill="#F5F7FA"/>
        <circle cx="114" cy="143" r="13" fill="#5B7CFF"/>
      </svg>
      <span class="brand-text">
        <span class="brand-name">nodusing</span>
        <span class="brand-city">PARIS</span>
      </span>
    </a>
  </header>

  <main class="page-main">
    <section class="contact">
      <h2>Démarrons votre projet<span class="pt">.</span></h2>
      <p class="contact-sub">Parlez-nous de votre idée — nous revenons vers vous sous 24&nbsp;heures.</p>

      <form id="contactForm" name="contact" method="POST" action="/"
            data-netlify="true" netlify-honeypot="bot-field" novalidate>
        <input type="hidden" name="form-name" value="contact">
        <p class="hp-field" aria-hidden="true">
          <label>Ne pas remplir&nbsp;: <input name="bot-field" tabindex="-1" autocomplete="off"></label>
        </p>

        <div class="form-field">
          <label for="f-nom">Nom</label>
          <input type="text" id="f-nom" name="nom" required autocomplete="name" placeholder="Marie Dupont">
          <span class="field-error" aria-live="polite"></span>
        </div>

        <div class="form-field">
          <label for="f-email">Email</label>
          <input type="email" id="f-email" name="email" required autocomplete="email" placeholder="marie@entreprise.fr">
          <span class="field-error" aria-live="polite"></span>
        </div>

        <div class="form-field">
          <label for="f-message">Votre projet</label>
          <textarea id="f-message" name="message" rows="4" required placeholder="Décrivez votre idée…"></textarea>
          <span class="field-error" aria-live="polite"></span>
        </div>

        <button type="submit" class="btn btn-submit"><span class="btn-label">Envoyer</span></button>
        <p class="form-status" id="formStatus" role="status" aria-live="polite"></p>
      </form>

      <div class="form-success" id="formSuccess" hidden>
        <svg viewBox="0 0 140 170" width="46" height="56" aria-hidden="true">
          <path d="M26 143 V27 L114 143 V27" fill="none" stroke="#F5F7FA" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="26" cy="27" r="10" fill="#F5F7FA"/>
          <circle cx="26" cy="143" r="10" fill="#F5F7FA"/>
          <circle cx="114" cy="27" r="10" fill="#F5F7FA"/>
          <circle cx="114" cy="143" r="13" fill="#5B7CFF"/>
        </svg>
        <h3>Message bien reçu<span class="pt">.</span></h3>
        <p>Nous revenons vers vous sous 24&nbsp;heures ouvrées.</p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>nodusing — Paris, France · © <span id="year">2026</span></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
