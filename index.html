<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nodusing Paris — Applications sur mesure</title>
  <meta name="description" content="nodusing conçoit des applications web, mobiles et SaaS sur mesure pour les entreprises et commerces. À Paris.">
  <meta property="og:title" content="nodusing Paris — Applications sur mesure">
  <meta property="og:description" content="Le point où votre business se connecte à la technologie.">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="fr_FR">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230B1220'/%3E%3Cpath d='M20 47 V17 L44 47 V17' fill='none' stroke='%23F5F7FA' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='20' cy='17' r='4.5' fill='%23F5F7FA'/%3E%3Ccircle cx='20' cy='47' r='4.5' fill='%23F5F7FA'/%3E%3Ccircle cx='44' cy='17' r='4.5' fill='%23F5F7FA'/%3E%3Ccircle cx='44' cy='47' r='6' fill='%235B7CFF'/%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main>

    <!-- ═══════════ ACCUEIL : LE LOGO ═══════════ -->
    <section class="hero">
      <canvas id="nodeField" class="node-field" aria-hidden="true"></canvas>

      <div class="hero-logo" id="heroLogo" role="img" aria-label="nodusing Paris" tabindex="0" title="Cliquer pour rejouer l'animation">

        <svg class="monogram" viewBox="0 0 140 170" aria-hidden="true">
          <defs>
            <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
              <feGaussianBlur stdDeviation="5"/>
            </filter>
          </defs>

          <!-- trait du N -->
          <path id="nPath" class="mark-stroke" d="M26 143 V27 L114 143 V27"
                fill="none" stroke="#F5F7FA" stroke-width="6"
                stroke-linecap="round" stroke-linejoin="round"/>

          <!-- comète d'introduction -->
          <circle class="comet" r="7" fill="#5B7CFF" filter="url(#glow)">
            <animateMotion id="cometMove" dur="1.6s" begin="indefinite"
                           path="M26 143 V27 L114 143 V27"/>
          </circle>

          <!-- impulsion périodique (régime de croisière) -->
          <circle class="pulse" r="4.5" fill="#8FA6FF" filter="url(#glow)" opacity="0">
            <animateMotion id="pulseMove" dur="2.2s" begin="indefinite"
                           path="M26 143 V27 L114 143 V27"/>
            <animate id="pulseFade" attributeName="opacity" begin="indefinite"
                     dur="2.2s" values="0;0.75;0.75;0" keyTimes="0;0.12;0.82;1"/>
          </circle>

          <!-- ondes du nœud accent -->
          <circle class="ripple ripple-1" cx="114" cy="143" r="13" fill="none" stroke="#5B7CFF" stroke-width="2"/>
          <circle class="ripple ripple-2" cx="114" cy="143" r="13" fill="none" stroke="#5B7CFF" stroke-width="1.5"/>

          <!-- les 4 nœuds -->
          <circle class="node n1" cx="26"  cy="143" r="10" fill="#F5F7FA"/>
          <circle class="node n2" cx="26"  cy="27"  r="10" fill="#F5F7FA"/>
          <circle class="node n3 accent-node" cx="114" cy="143" r="13" fill="#5B7CFF"/>
          <circle class="node n4" cx="114" cy="27"  r="10" fill="#F5F7FA"/>
        </svg>

        <p class="wordmark" aria-hidden="true">
          <span style="--i:0">n</span><span style="--i:1">o</span><span style="--i:2">d</span><span style="--i:3">u</span><span style="--i:4">s</span><span style="--i:5">i</span><span style="--i:6">n</span><span style="--i:7">g</span>
        </p>
        <p class="paris" aria-hidden="true">PARIS</p>
      </div>

      <div class="hero-after">
        <p class="tagline">Applications sur mesure pour les entreprises et commerces<span class="pt">.</span></p>
        <a href="#contact" class="btn">Démarrer un projet</a>
      </div>
    </section>

    <!-- ═══════════ CONTACT ═══════════ -->
    <section class="contact reveal" id="contact">
      <h2>Démarrons votre projet<span class="pt">.</span></h2>
      <p class="contact-sub">Parlez-nous de votre idée — nous revenons vers vous sous 24&nbsp;heures.</p>

      <form id="contactForm" name="contact" method="POST" action="/"
            data-netlify="true" netlify-honeypot="bot-field" novalidate>
        <input type="hidden" name="form-name" value="contact">
        <p class="hp-field" aria-hidden="true">
          <label>Ne pas remplir&nbsp;: <input name="bot-field" tabindex="-1" autocomplete="off"></label>
        </p>

        <div class="form-field">
          <label for="f-nom">Nom</label>
          <input type="text" id="f-nom" name="nom" required autocomplete="name" placeholder="Marie Dupont">
          <span class="field-error" aria-live="polite"></span>
        </div>

        <div class="form-field">
          <label for="f-email">Email</label>
          <input type="email" id="f-email" name="email" required autocomplete="email" placeholder="marie@entreprise.fr">
          <span class="field-error" aria-live="polite"></span>
        </div>

        <div class="form-field">
          <label for="f-message">Votre projet</label>
          <textarea id="f-message" name="message" rows="4" required placeholder="Décrivez votre idée…"></textarea>
          <span class="field-error" aria-live="polite"></span>
        </div>

        <button type="submit" class="btn btn-submit"><span class="btn-label">Envoyer</span></button>
        <p class="form-status" id="formStatus" role="status" aria-live="polite"></p>
      </form>

      <div class="form-success" id="formSuccess" hidden>
        <svg viewBox="0 0 140 170" width="46" height="56" aria-hidden="true">
          <path d="M26 143 V27 L114 143 V27" fill="none" stroke="#F5F7FA" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="26" cy="27" r="10" fill="#F5F7FA"/>
          <circle cx="26" cy="143" r="10" fill="#F5F7FA"/>
          <circle cx="114" cy="27" r="10" fill="#F5F7FA"/>
          <circle cx="114" cy="143" r="13" fill="#5B7CFF"/>
        </svg>
        <h3>Message bien reçu<span class="pt">.</span></h3>
        <p>Nous revenons vers vous sous 24&nbsp;heures ouvrées.</p>
      </div>
    </section>
  </main>

  <!-- ═══════════ FOOTER ═══════════ -->
  <footer class="footer">
    <p>nodusing — Paris, France · © <span id="year">2026</span></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
