       distincte de "nod" / "nodus", qui dominent les resultats sur ce nom. -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",

<body data-title-key="title.home">

  <div class="top-controls">
    <button id="themeToggle" class="ctrl-btn" type="button" aria-label="Passer en mode sombre">
      <svg class="icon-moon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 14.5 A8.5 8.5 0 1 1 9.5 4 A7 7 0 0 0 20 14.5 Z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>

    <button id="langToggle" class="ctrl-btn ctrl-lang" type="button" aria-label="Switch to English">EN</button>

  <main>

    <!-- ═══════════ ACCUEIL : LE LOGO ═══════════ -->
    <section class="hero">
      <canvas id="nodeField" class="node-field" aria-hidden="true"></canvas>

      <div class="hero-logo" id="heroLogo" role="img" aria-label="nodusing Paris">

        <svg class="monogram" viewBox="0 0 140 170" aria-hidden="true">
          <defs>
            <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
              <feGaussianBlur stdDeviation="5"/>
            </filter>
          </defs>

          <!-- trait du N -->
          <path id="nPath" class="mark-stroke" d="M26 143 V27 L114 143 V27"
                fill="none" stroke="#12161D" stroke-width="6"
                stroke-linecap="round" stroke-linejoin="round"/>

          <!-- comète qui parcourt le tracé -->
          <circle class="comet" r="7" fill="#002FA7" filter="url(#glow)">
            <animateMotion id="cometMove" dur="1.6s" begin="indefinite"
                           path="M26 143 V27 L114 143 V27"/>
          </circle>

          <!-- ondes du nœud accent -->
          <circle class="ripple ripple-1" cx="114" cy="143" r="13" fill="none" stroke="#002FA7" stroke-width="2"/>
          <circle class="ripple ripple-2" cx="114" cy="143" r="13" fill="none" stroke="#002FA7" stroke-width="1.5"/>

          <!-- les 4 nœuds -->
          <circle class="node n1" cx="26"  cy="143" r="10" fill="#12161D"/>
          <circle class="node n2" cx="26"  cy="27"  r="10" fill="#12161D"/>
          <circle class="node n3 accent-node" cx="114" cy="143" r="13" fill="#002FA7"/>
          <circle class="node n4" cx="114" cy="27"  r="10" fill="#12161D"/>
        </svg>

        <p class="wordmark" aria-hidden="true">
          <span style="--i:0">n</span><span style="--i:1">o</span><span style="--i:2">d</span><span style="--i:3">u</span><span style="--i:4">s</span><span style="--i:5">i</span><span style="--i:6">n</span><span style="--i:7">g</span>
        </p>
        <p class="paris" aria-hidden="true">PARIS</p>
      </div>

      <div class="hero-after">
        <a href="contact.html" class="btn" data-i18n="cta">Contactez-moi</a>
      </div>

      <aside class="works" aria-label="Réalisations">

        <!-- ── Applications mobiles ── -->

          <h2 class="works-title" data-i18n="works.apps">Applications mobiles</h2>

          <a href="https://logik.nodusing.paris" class="work-card">
            <svg class="work-icon" viewBox="0 0 48 48" width="34" height="34" aria-hidden="true">
              <rect x="8"  y="8"  width="14" height="14" rx="4" fill="currentColor"/>
              <rect x="8"  y="26" width="14" height="14" rx="4" fill="currentColor"/>
              <rect x="26" y="26" width="14" height="14" rx="4" fill="currentColor"/>
              <circle cx="33" cy="15" r="7" class="work-icon-accent"/>
            </svg>
            <span class="work-text">
              <span class="work-name" data-i18n="works.logik">Logik</span>
              <span class="work-sub" data-i18n="works.logik.sub">Un défi de logique par jour</span>
            </span>
            <svg class="work-arrow" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M5 12h14M13 6l6 6-6 6"/>
            </svg>
          </a>

          <!-- Pointe vers /beta (opt-in test ferme) : la fiche Play publique
               n'existe pas encore. Basculer sur /get a la publication. -->
          <a href="/beta" class="work-card">
            <svg class="work-icon" viewBox="0 0 48 48" width="34" height="34" aria-hidden="true">
              <rect x="7"  y="9"  width="15" height="7" rx="2.5" fill="currentColor"/>
              <rect x="26" y="9"  width="15" height="7" rx="2.5" fill="currentColor"/>
              <rect x="7"  y="20" width="15" height="7" rx="2.5" fill="currentColor"/>
              <rect x="26" y="20" width="15" height="7" rx="2.5" fill="currentColor"/>
              <circle cx="24" cy="33" r="4" class="work-icon-accent"/>
              <path d="M15 41 H33" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
            </svg>
            <span class="work-text">
              <span class="work-name">
                <span data-i18n="works.brick">Brick Rogue</span>
                <span class="work-badge" data-i18n="works.beta">Bêta</span>
              </span>
              <span class="work-sub" data-i18n="works.brick.sub">Casse-briques roguelike</span>
            </span>
            <svg class="work-arrow" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M5 12h14M13 6l6 6-6 6"/>
            </svg>
          </a>
        </section>

        <!-- ── Le petit jeu ── -->
        <section class="works-group">

          <a href="jeu.html" class="work-card">
            <svg class="work-icon" viewBox="0 0 48 48" width="34" height="34" aria-hidden="true">

                <line x1="10" y1="14" x2="38" y2="34"/>
                <line x1="38" y1="14" x2="10" y2="34"/>

                <line x1="10" y1="34" x2="24" y2="8"/>

              <circle cx="10" cy="14" r="4" fill="currentColor"/>
              <circle cx="38" cy="14" r="4" fill="currentColor"/>
              <circle cx="24" cy="8"  r="4" fill="currentColor"/>
              <circle cx="10" cy="34" r="4" fill="currentColor"/>
              <circle cx="38" cy="34" r="5" class="work-icon-accent"/>
            </svg>
            <span class="work-text">
              <span class="work-name" data-i18n="works.knot">Le Nœud</span>
              <span class="work-sub" data-i18n="works.knot.sub">Testez votre logique</span>
